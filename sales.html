<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Data: Salmon Street Cookies</title>

  <!-- Google Font for headings -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="reset.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>
    <h1>Welcome to Salmon Street Cookies!</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="sales.html">Sales Data</a>
    </nav>
  </header>

  <main>
    <h2>Sales Data</h2>

    <section>
      <table id="sales-table"></table>
    </section>
  </main>

  <section>
  <h3>Add a New Location</h3>

  <form id="store-form">

    <label>
      Location Name:
      <input id="store-name" type="text" required />
    </label>

    <label>
      Min Customers/Hour:
      <input id="store-min" type="number" required />
    </label>

    <label>
      Max Customers/Hour:
      <input id="store-max" type="number" required />
    </label>

    <label>
      Avg Cookies/Sale:
      <input id="store-avg" type="number" step="0.1" required />
    </label>

    <button type="submit">Add Location</button>

  </form>
</section>

  <footer>
    <p>© 2026 Salmon Street Cookies</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
